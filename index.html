<!doctype html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Investment Forecast</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Investment Forecast</h1>
      <p class="sub">Промяна на количество + цена за единица + автоматични прогнози</p>
    </div>
    <div class="header-actions">
      <button id="resetBtn" class="secondary-btn">Нулирай локалните данни</button>
      <button id="installBtn" class="primary hidden">Инсталирай</button>
    </div>
  </header>

  <main class="container">
    <section id="dashboardView"></section>
    <section id="contentView" class="hidden"></section>
  </main>

  <nav class="bottom-nav">
    <button id="navDashboard" class="nav-btn active">Dashboard</button>
    <button id="navUnits" class="nav-btn">Количество и цена</button>
    <button id="navHorizons" class="nav-btn">Хоризонти</button>
    <button id="navSolana" class="nav-btn">Solana</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
